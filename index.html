<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI高级商城</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b1220;
  color:white;
}

/* HEADER */
.header{
  background:#111827;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.verified-badge{
  margin-left:8px;
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(59,130,246,0.15);
  color:#60a5fa;
  border:1px solid rgba(59,130,246,0.3);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
  position:relative;
  z-index:1;
  overflow:visible;
}

/* CARD */
.card{
  background:#111827;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  height:130px;
  object-fit:contain;
  background:#0f172a;
}

.card-body{
  padding:10px;
}

.price{
  color:#93c5fd;
}

/* QTY */
.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-top:8px;
}

.qty button{
  width:28px;
  height:28px;
  border:none;
  border-radius:50%;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  position:relative;
  z-index:5;
}

/* CART */
.cart{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#0f1720;
  padding:12px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.05);
}

.cart button{
  background:#ef4444;
  color:white;
  border:none;
  padding:10px;
  width:90%;
  border-radius:10px;
  cursor:pointer;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  color:black;
  padding:20px;
  border-radius:14px;
  text-align:center;
  width:300px;
}
</style>
</head>

<body>

<div class="header">
🚀 AI高级商城 <span class="verified-badge">✔ VERIFIED</span>
</div>

<div class="grid">

<div class="card">
<img src="images/gemini.jpg.png">
<div class="card-body">
<h3>Gemini Ultra</h3>
<p class="price">180 元</p>
<div class="qty">
<button onclick="min('Gemini')">-</button>
<span id="Gemini">0</span>
<button onclick="add('Gemini')">+</button>
</div>
</div>
</div>

<div class="card">
<img src="images/cursor.jpg.jpg">
<div class="card-body">
<h3>Cursor Ultra</h3>
<p class="price">371 元</p>
<div class="qty">
<button onclick="min('Cursor')">-</button>
<span id="Cursor">0</span>
<button onclick="add('Cursor')">+</button>
</div>
</div>
</div>

<div class="card">
<img src="images/claude.jpg.jpg">
<div class="card-body">
<h3>Claude x5</h3>
<p class="price">280 元</p>
<div class="qty">
<button onclick="min('Claude5')">-</button>
<span id="Claude5">0</span>
<button onclick="add('Claude5')">+</button>
</div>
</div>
</div>

<div class="card">
<img src="images/claude.jpg.jpg">
<div class="card-body">
<h3>Claude x20</h3>
<p class="price">480 元</p>
<div class="qty">
<button onclick="min('Claude20')">-</button>
<span id="Claude20">0</span>
<button onclick="add('Claude20')">+</button>
</div>
</div>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>总计: <span id="total">0</span> 元</h3>
<button onclick="pay()">立即下单</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>支付宝支付</h3>
<p>请扫描二维码支付</p>
<img src="images/qris.png.jpg" width="180"><br><br>
<button onclick="send()">我已付款</button>
</div>
</div>

<script>
let cart = {
Gemini:0,
Cursor:0,
Claude5:0,
Claude20:0
};

let price = {
Gemini:180,
Cursor:371,
Claude5:280,
Claude20:480
};

function add(i){
cart[i]++;
update();
}

function min(i){
if(cart[i]>0){
cart[i]--;
update();
}
}

function update(){
let total=0;

for(let i in cart){
document.getElementById(i).innerText=cart[i];
total+=cart[i]*price[i];
}

document.getElementById("total").innerText=total;
}

function pay(){
document.getElementById("modal").style.display="flex";
}

function send(){
let text="我已付款:\n";
let total=0;

for(let i in cart){
if(cart[i]>0){
text+=i+" x"+cart[i]+"\n";
total+=cart[i]*price[i];
}
}

text+="\n总计: "+total+" 元";

window.location.href="https://t.me/sukzzoffc?text="+encodeURIComponent(text);
}
</script>

</body>
</html>
